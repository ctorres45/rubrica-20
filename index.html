<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitchash - Suplementos Deportivos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="https://i.ibb.co/rxV6wMc/fitchash-logo.png" alt="logo">
      <h1>Fitchash</h1>
    </div>
    <nav>
      <a href="#productos">Productos</a>
      <a href="#carrito">Carrito 🛒</a>
      <a href="https://wa.me/573116408358" target="_blank">WhatsApp</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>💪 Suplementos Deportivos Premium</h2>
    <p>Mejora tu rendimiento con la mejor calidad</p>
    <a href="#productos" class="btn-hero">Ver catálogo</a>
  </section>

  <!-- MAIN -->
  <main>

    <!-- PRODUCTOS -->
    <section id="productos">
      <h2>Catálogo</h2>
      <div class="productos-grid"></div>
    </section>

    <!-- CARRITO -->
    <section id="carrito">
      <h2>🛒 Tu Carrito</h2>
      <ul id="lista-carrito">
        <li>Carrito vacío 😢</li>
      </ul>
      <p id="total">Total: $0</p>
      <a id="whatsapp-btn" href="#" target="_blank" rel="noopener noreferrer">
        Finalizar compra en WhatsApp
      </a>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Fitchash | Suplementos deportivos</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
